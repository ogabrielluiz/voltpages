name: Validate

# Run on PRs and on pushes to main so schema / renderer / data drift is caught
# before the deploy workflow picks the commit up. The path filters keep
# unrelated commits (e.g. README tweaks) from spinning up the runner.
on:
  pull_request:
    paths:
      - 'src/data/modules/**'
      - 'modules.schema.json'
      - 'scripts/validate-modules.ts'
      - 'src/lib/**'
      - 'src/types/**'
      - 'src/components/**'
      - 'src/pages/**'
      - 'src/styles/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/validate.yml'
  push:
    branches: [main]
    paths:
      - 'src/data/modules/**'
      - 'modules.schema.json'
      - 'scripts/validate-modules.ts'
      - 'src/lib/**'
      - 'src/types/**'
      - 'src/components/**'
      - 'src/pages/**'
      - 'src/styles/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/validate.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Astro 6 requires Node >=22.12 even when Bun is the package manager
      # (its internal tooling uses the Node runtime). Match the deploy workflow.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      # Schema + diagram check over all sheets. Fast; the authoritative source
      # of truth for "is this sheet well-formed".
      - name: Validate module data
        run: bun run validate

      # Integration check — catches drift where a schema or component change
      # breaks the renderer even when individual JSONs still validate.
      - name: Build site
        run: bun run build
